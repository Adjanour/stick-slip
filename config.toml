# stickslip configuration — uncomment and tweak what you need.
# All fields shown at their default values.

[pipeline]
window_seconds = 5.0
sample_rate = 50.0
chunk_size = 10
channel = "RPM"
duration_seconds = 15.0
bit_depth = 1000.0
baseline_rpm = 100.0
baseline_wob = 50000.0

[filter]
low_hz = 0.5
high_hz = 8.0
order = 4

[drill_string]
shear_modulus = 80000000000.0  # 80 GPa
length = 1000.0
material_density = 7850.0

[sideband]
max_order = 3
min_ratio = 0.05
search_window_hz = 0.15

[assessment]
growing_threshold = 0.001
mitigate_threshold = 0.005

[mitigation]
rpm_boost = 1.15
wob_cut = 0.70
energy_wob_cut = 0.50
ramp_step = 0.05

[bha]
g_base = 79000000000.0  # 79 GPa
surface_temp = 25.0
geothermal_gradient = 0.03
g_temp_derating = 0.023
t_off_bottom = 5000.0

[[bha.fixed_components]]
od = 0.171
id = 0.071
length = 120.0
label = "drill_collar"

[[bha.fixed_components]]
od = 0.127
id = 0.076
length = 200.0
label = "hwdp"

[bha.pipe_geometry]
od = 0.127
id = 0.108
length = 0.0
label = "drill_pipe"
